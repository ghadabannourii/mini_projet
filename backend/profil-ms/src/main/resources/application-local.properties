# ═══════════════════════════════════════════════════════════════
# Profil MS — Configuration pour développement LOCAL (sans Docker)
#
# Utilisation : lancer avec -Dspring.profiles.active=local
# ou ajouter spring.profiles.active=local dans application.properties
#
# Prérequis locaux :
#   - XAMPP MySQL sur port 3307
#   - Créer la base : CREATE DATABASE profil_db;
#   - Eureka sur localhost:8761
#   - RabbitMQ sur localhost:5672
# ═══════════════════════════════════════════════════════════════

# MySQL XAMPP — port 3307 (XAMPP utilise 3307 au lieu de 3306)
spring.datasource.url=jdbc:mysql://localhost:3307/profil_db
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# Eureka local
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka

# RabbitMQ local
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672

# Config Server local
spring.config.import=optional:configserver:http://localhost:8888
