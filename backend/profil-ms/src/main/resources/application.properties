spring.application.name=profil-ms
server.port=8081

# ─── Base de donnees MySQL ────────────────────────────────────────────────────
# En mode Docker : "mysql" est le hostname du conteneur MySQL (port interne 3306)
# En mode local  : utiliser application-local.properties (localhost:3307 pour XAMPP)
spring.datasource.url=jdbc:mysql://mysql:3306/profil_db
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─── Eureka ──────────────────────────────────────────────────────────────────
eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# ─── RabbitMQ ────────────────────────────────────────────────────────────────
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ─── Config Server (optionnel) ───────────────────────────────────────────────
spring.config.import=optional:configserver:http://config-server:8888
spring.cloud.config.enabled=true

# ─── Actuator + Prometheus ───────────────────────────────────────────────────
management.endpoints.web.exposure.include=refresh,health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
