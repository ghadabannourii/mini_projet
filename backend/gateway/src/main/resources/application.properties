spring.application.name=gateway
server.port=9999

# ─── Eureka ──────────────────────────────────────────────────────────────────
eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# ─── Config Server (optionnel — ne bloque pas si indisponible) ───────────────
spring.config.import=optional:configserver:http://config-server:8888
spring.cloud.config.enabled=false

# ─── Routes Spring Cloud Gateway ─────────────────────────────────────────────
spring.cloud.gateway.routes[0].id=profil-service
spring.cloud.gateway.routes[0].uri=lb://PROFIL-MS
spring.cloud.gateway.routes[0].predicates[0]=Path=/utilisateurs/**,/analyses/**,/alertes/**,/welcome

spring.cloud.gateway.routes[1].id=routine-service
spring.cloud.gateway.routes[1].uri=lb://ROUTINE-MS
spring.cloud.gateway.routes[1].predicates[0]=Path=/routines/**,/health

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ─── Keycloak OAuth2 Resource Server ─────────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8099/realms/SkinBeautyRealm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8099/realms/SkinBeautyRealm/protocol/openid-connect/certs

# ─── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
